services:
  db:
    image: postgres:15
    container_name: futball_stars_pg
    restart: always
    environment:
      POSTGRES_DB: futball_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root123
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

volumes:
  pg_data: